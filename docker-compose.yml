services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: qrl
      POSTGRES_PASSWORD: qrl
      POSTGRES_DB: qrl
    ports:
      - "5432:5432"
    volumes:
      - qrl_pg:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://qrl:qrl@db:5432/qrl
      CORS_ORIGINS: http://localhost:5173
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  qrl_pg:
